<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankVault - Repositorio de Cuentas Bancarias</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div>
            <h1>🏦 BankVault</h1>
            <p>Repositorio de cuentas bancarias</p>
        </div>
        <span class="header-badge">Versión 1.0</span>
    </header>

    <!-- TABS Y BOTONES -->
    <div class="tabs-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="cambiarTab('empresas', event)">
                🏢 Empresas
                <span class="tab-counter" id="contador-empresas">0</span>
            </button>
            <button class="tab-btn" onclick="cambiarTab('cuentas', event)">
                💳 Cuentas
                <span class="tab-counter" id="contador-cuentas">0</span>
            </button>
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn-new" onclick="abrirModalEmpresa()">
                ➕ Nueva Empresa
            </button>
            <button class="btn-new" onclick="abrirModalCuenta()">
                ➕ Nueva Cuenta
            </button>
        </div>
    </div>

    <!-- FILTROS -->
    <section class="filters-section">
        <h3 class="filters-title">🔍 Búsqueda Inteligente</h3>
        <div class="filters-grid">
            <input 
                type="text" 
                id="searchGeneral" 
                class="filter-input" 
                placeholder="Buscar por banco, empresa, IBAN, SWIFT, país..." 
                oninput="filtrarTodo()">
            <select id="filterContinente" class="filter-select" onchange="filtrarTodo()">
                <option value="">Todos los continentes</option>
            </select>
            <select id="filterMoneda" class="filter-select" onchange="filtrarTodo()">
                <option value="">Todas las monedas</option>
                <option value="EUR">EUR - Euro</option>
                <option value="USD">USD - Dólar</option>
                <option value="MXN">MXN - Peso Mexicano</option>
                <option value="COP">COP - Peso Colombiano</option>
                <option value="ARS">ARS - Peso Argentino</option>
            </select>
            <select id="filterPais" class="filter-select" onchange="filtrarTodo()">
                <option value="">Todos los países</option>
            </select>
        </div>
    </section>

    <!-- CONTENEDOR PRINCIPAL -->
    <main class="main-container">
        
        <!-- DASHBOARD EMPRESAS -->
        <div id="dashboardEmpresas" class="dashboard">
            <div id="dashboardEmpresasGrid" class="dashboard-grid"></div>
        </div>

        <!-- DASHBOARD CUENTAS -->
        <div id="dashboardCuentas" class="dashboard" style="display: none;">
            <div id="dashboardCuentasGrid" class="dashboard-grid"></div>
        </div>

    </main>

    <!-- ========================================
         MODAL: NUEVA EMPRESA
         ======================================== -->
    <div id="modalEmpresa" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">🏢 Nueva Empresa</h2>
                <button class="modal-close" onclick="cerrarModalEmpresa()">✕</button>
            </div>

            <form id="formEmpresa" onsubmit="guardarEmpresa(event)">
                
                <div class="form-group">
                    <label>Nombre <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="empresaNombre" 
                        placeholder="Ej: Inditex S.A." 
                        required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>País <span class="required">*</span></label>
                        <select id="empresaPais" required onchange="actualizarLabelFiscal()">
                            <option value="">Seleccionar país...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label id="labelFiscal">NIF/CIF <span class="required">*</span></label>
                        <input 
                            type="text" 
                            id="empresaTaxId" 
                            placeholder="Ej: A15075062" 
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Dirección <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="empresaDireccion" 
                        placeholder="Calle, número, ciudad" 
                        required>
                </div>

                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input 
                        type="email" 
                        id="empresaMail" 
                        placeholder="contacto@empresa.com" 
                        required>
                </div>

                <div class="form-group">
                    <label>Actividad Económica Principal <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="empresaActividad" 
                        placeholder="Ej: Retail Textil" 
                        required>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="cerrarModalEmpresa()">Cancelar</button>
                    <button type="submit" class="btn-save">✅ Guardar Empresa</button>
                </div>

            </form>
        </div>
    </div>

    <!-- ========================================
         MODAL: NUEVA CUENTA
         ======================================== -->
    <div id="modalCuenta" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">💳 Nueva Cuenta Bancaria</h2>
                <button class="modal-close" onclick="cerrarModalCuenta()">✕</button>
            </div>

            <form id="formCuenta" onsubmit="guardarCuenta(event)">
                
                <div class="form-group">
                    <label>Empresa <span class="required">*</span></label>
                    <select id="cuentaEmpresa" required>
                        <option value="">Seleccionar empresa...</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Banco <span class="required">*</span></label>
                        <input 
                            type="text" 
                            id="cuentaBanco" 
                            placeholder="Ej: Banco Santander" 
                            required>
                    </div>
                    <div class="form-group">
                        <label>Moneda <span class="required">*</span></label>
                        <select id="cuentaMoneda" required>
                            <option value="">Seleccionar...</option>
                            <option value="EUR">EUR</option>
                            <option value="USD">USD</option>
                            <option value="MXN">MXN</option>
                            <option value="COP">COP</option>
                            <option value="ARS">ARS</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>País <span class="required">*</span></label>
                        <select id="cuentaPais" required>
                            <option value="">Seleccionar país...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Dirección <span class="required">*</span></label>
                        <input 
                            type="text" 
                            id="cuentaDireccion" 
                            placeholder="Ciudad, estado" 
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label>IBAN <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="cuentaIban" 
                        placeholder="Ej: ES21 0049 1500 1234 5678" 
                        required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>SWIFT/BIC</label>
                        <input 
                            type="text" 
                            id="cuentaSwift" 
                            placeholder="Ej: BSANESSMMXX">
                    </div>
                    <div class="form-group">
                        <label>Ruta/ABA</label>
                        <input 
                            type="text" 
                            id="cuentaRuta" 
                            placeholder="Ej: 021000021">
                    </div>
                </div>

                <div class="form-group">
                    <label>Notas</label>
                    <textarea id="cuentaNotas" placeholder="Información adicional..."></textarea>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="cerrarModalCuenta()">Cancelar</button>
                    <button type="submit" class="btn-save">✅ Guardar Cuenta</button>
                </div>

            </form>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="app.js"></script>
    <script>
        // Funciones para abrir y cerrar modales
        function abrirModalEmpresa() {
            document.getElementById('modalEmpresa').classList.add('active');
            document.getElementById('formEmpresa').reset();
        }

        function cerrarModalEmpresa() {
            document.getElementById('modalEmpresa').classList.remove('active');
        }

        function abrirModalCuenta() {
            document.getElementById('modalCuenta').classList.add('active');
            document.getElementById('formCuenta').reset();
            poblarSelectoEmpresas();
        }

        function cerrarModalCuenta() {
            document.getElementById('modalCuenta').classList.remove('active');
        }

        // Cerrar modal al hacer clic en el overlay
        document.getElementById('modalEmpresa')?.addEventListener('click', (e) => {
            if (e.target.id === 'modalEmpresa') cerrarModalEmpresa();
        });

        document.getElementById('modalCuenta')?.addEventListener('click', (e) => {
            if (e.target.id === 'modalCuenta') cerrarModalCuenta();
        });

        // Guardar empresa
        function guardarEmpresa(e) {
            e.preventDefault();
            
            const nuevaEmpresa = {
                id: 'e' + Date.now(),
                nombre: document.getElementById('empresaNombre').value,
                pais: document.getElementById('empresaPais').value,
                continente: appState.diccionarioPaises[document.getElementById('empresaPais').value]?.continente,
                taxId: document.getElementById('empresaTaxId').value,
                direccion: document.getElementById('empresaDireccion').value,
                mail: document.getElementById('empresaMail').value,
                actividad: document.getElementById('empresaActividad').value
            };

            appState.datasetEmpresas.push(nuevaEmpresa);
            guardarEnLocalStorage();
            cerrarModalEmpresa();
            filtrarTodo();
            alert('✅ Empresa creada exitosamente');
        }

        // Guardar cuenta
        function guardarCuenta(e) {
            e.preventDefault();
            
            const empresaId = document.getElementById('cuentaEmpresa').value;
            const empresa = appState.datasetEmpresas.find(e => e.id === empresaId);

            const nuevaCuenta = {
                id: 'c' + Date.now(),
                empresaId: empresaId,
                banco: document.getElementById('cuentaBanco').value,
                moneda: document.getElementById('cuentaMoneda').value,
                pais: document.getElementById('cuentaPais').value,
                continente: appState.diccionarioPaises[document.getElementById('cuentaPais').value]?.continente,
                direccion: document.getElementById('cuentaDireccion').value,
                iban: document.getElementById('cuentaIban').value,
                swift: document.getElementById('cuentaSwift').value || 'No disponible',
                ruta: document.getElementById('cuentaRuta').value || 'No Aplica',
                notas: document.getElementById('cuentaNotas').value
            };

            appState.datasetCuentas.push(nuevaCuenta);
            guardarEnLocalStorage();
            cerrarModalCuenta();
            filtrarTodo();
            alert('✅ Cuenta creada exitosamente');
        }

        // Poblar select de empresas
        function poblarSelectoEmpresas() {
            const select = document.getElementById('cuentaEmpresa');
            select.innerHTML = '<option value="">Seleccionar empresa...</option>';
            appState.datasetEmpresas.forEach(emp => {
                const option = document.createElement('option');
                option.value = emp.id;
                option.textContent = emp.nombre;
                select.appendChild(option);
            });
        }

        // Actualizar label de impuesto según país
        function actualizarLabelFiscal() {
            const pais = document.getElementById('empresaPais').value;
            const label = appState.diccionarioPaises[pais]?.taxLabel || 'NIF/CIF';
            const labelElement = document.getElementById('labelFiscal');
            labelElement.textContent = label + ' ';
            const span = document.createElement('span');
            span.className = 'required';
            span.textContent = '*';
            labelElement.appendChild(span);
        }

        // Guardar en localStorage
        function guardarEnLocalStorage() {
            localStorage.setItem('datasetEmpresas', JSON.stringify(appState.datasetEmpresas));
            localStorage.setItem('datasetCuentas', JSON.stringify(appState.datasetCuentas));
        }

        // Cargar de localStorage
        function cargarDeLocalStorage() {
            const empresas = localStorage.getItem('datasetEmpresas');
            const cuentas = localStorage.getItem('datasetCuentas');
            if (empresas) appState.datasetEmpresas = JSON.parse(empresas);
            if (cuentas) appState.datasetCuentas = JSON.parse(cuentas);
        }

        // Hook para cargar datos locales después de cargar data.json
        const cargarDatosOriginal = window.cargarDatos;
        window.cargarDatos = async function() {
            await cargarDatosOriginal();
            cargarDeLocalStorage();
            inicializarPaisesModales();
            filtrarTodo();
        };

        // Inicializar países en los modales
        function inicializarPaisesModales() {
            const paisesSelect = [
                document.getElementById('empresaPais'),
                document.getElementById('cuentaPais')
            ];

            const paises = Object.keys(appState.diccionarioPaises);
            paisesSelect.forEach(select => {
                paises.forEach(pais => {
                    const option = document.createElement('option');
                    option.value = pais;
                    option.textContent = pais;
                    select.appendChild(option);
                });
            });
        }
    </script>

</body>
</html>
